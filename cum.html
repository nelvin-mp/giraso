<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feliz Cumpleaños</title>

<style>

body{
margin:0;
background:#ffecf2;
font-family:Arial;
text-align:center;
overflow:hidden;
}

#pantalla1{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
font-size:60px;
color:#ff3e7f;
animation:latido 1s infinite;
}

@keyframes latido{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

p{
font-size:24px;
color:#444;
}

button{
margin-top:30px;
padding:20px 40px;
font-size:25px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
cursor:pointer;
}

#pantalla2{
display:none;
position:absolute;
width:100%;
height:100%;
}

#girasol{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%) scale(0.1);
animation:crecer 5s forwards;
}

@keyframes crecer{
0%{transform:translateX(-50%) scale(0.1)}
100%{transform:translateX(-50%) scale(1)}
}

.corazon{
position:absolute;
color:red;
font-size:30px;
animation:subir 3s linear forwards;
}

@keyframes subir{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-600px);
opacity:0;
}
}

</style>
</head>

<body>

<div id="pantalla1">

<h1>🎂 Feliz Cumpleaños 🎂</h1>

<p>Hoy celebramos a una persona muy especial</p>
<p>Que tu día esté lleno de amor ❤️</p>
<p>y momentos hermosos 🌸</p>

<button onclick="empezar()">Aplástame aquí</button>

</div>

<div id="pantalla2">

<img id="girasol" src="girasol.jpg" width="350">

</div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

function empezar(){

document.getElementById("pantalla1").style.display="none";
document.getElementById("pantalla2").style.display="block";

document.getElementById("musica").play();

explosionCorazones();

}

function explosionCorazones(){

setInterval(function(){

let corazon=document.createElement("div");

corazon.className="corazon";
corazon.innerHTML="❤️";

corazon.style.left=Math.random()*window.innerWidth+"px";
corazon.style.bottom="0px";

document.body.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},3000);

},200);

}

</script>

</body>
</html>
